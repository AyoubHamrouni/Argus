apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ai-soc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            memory: 256Mi
            cpu: 0.25
          requests:
            memory: 128Mi
            cpu: 0.1
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ai-soc
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379