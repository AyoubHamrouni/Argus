name: CI - Continuous Integration

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort pylint mypy flake8 bandit
          pip install -r services/alert-triage/requirements.txt || true
          pip install -r services/rag-service/requirements.txt || true
          pip install -r ml_training/requirements.txt || true

      - name: Run Black (Code Formatting)
        run: black --check --diff services/ tests/

      - name: Run isort (Import Sorting)
        run: isort --check-only --diff services/ tests/

      - name: Run Pylint (Code Analysis)
        run: |
          pylint services/alert-triage/*.py
          pylint services/rag-service/*.py
          pylint services/common/*.py

      - name: Run Flake8 (Style Guide)
        run: flake8 services/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run MyPy (Type Checking)
        run: mypy services/alert-triage/*.py --ignore-missing-imports

      - name: Run Bandit (Security Linting)
        run: |
          bandit -r services/ -f json -o bandit-report.json
          bandit -r services/ -f screen

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov pytest-xdist httpx
          pip install -r services/alert-triage/requirements.txt || true
          pip install -r services/rag-service/requirements.txt || true
          pip install -r ml_training/requirements.txt || true

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short \
            --junit-xml=junit-unit.xml \
            --cov=services \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=50

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            junit-unit.xml
            htmlcov/
            coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-unit
          fail_ci_if_error: false

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8200:8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx
          pip install -r services/alert-triage/requirements.txt || true
          pip install -r services/rag-service/requirements.txt || true

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short \
            --junit-xml=junit-integration.xml \
            -m "not requires_ollama"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: junit-integration.xml

  # ============================================================================
  # Security Tests
  # ============================================================================
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio httpx
          pip install -r services/common/requirements.txt || true

      - name: Run security tests
        run: |
          pytest tests/security/ -v --tb=short \
            --junit-xml=junit-security.xml \
            -m security

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload security test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: |
            junit-security.xml
            trivy-results.sarif

  # ============================================================================
  # Docker Build Tests
  # ============================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [alert-triage, rag-service, correlation-engine, response-orchestrator]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          if [ -f "services/${{ matrix.service }}/Dockerfile" ]; then
            echo "Building ${{ matrix.service }} Docker image..."
            cd services/${{ matrix.service }}
            docker build -t ai-soc/${{ matrix.service }}:test .
          else
            echo "Dockerfile not found for ${{ matrix.service }}"
            exit 1
          fi

      - name: Test Docker image
        run: |
          docker run --rm ai-soc/${{ matrix.service }}:test python -c "print('ok')"

  # ============================================================================
  # Dependency Security Scan
  # ============================================================================
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk Security Scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high

      - name: Run Safety check
        continue-on-error: true
        run: |
          pip install safety
          safety check --json

  # ============================================================================
  # Test Summary
  # ============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests, security-tests, docker-build]
    if: always()

    steps:
      - name: Generate test summary
        run: |
          echo "# AI-SOC Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Tests | ${{ needs.security-tests.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Reports" >> $GITHUB_STEP_SUMMARY
          echo "View artifacts for detailed reports." >> $GITHUB_STEP_SUMMARY
