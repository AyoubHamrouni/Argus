site_name: AI-SOC Documentation
site_url: https://github.com/zhadyz/AI_SOC
site_description: AI-Augmented Security Operations Center — ML intrusion detection, LLM alert triage, RAG threat intelligence, and automated response orchestration

repo_name: zhadyz/AI_SOC
repo_url: https://github.com/zhadyz/AI_SOC
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: blue
  font:
    text: Inter
    code: SF Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zhadyz/AI_SOC

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Services: services.md
  - API Reference: api-reference.md
  - ML Models: ml-models.md
  - Deployment: deployment.md
  - Configuration: configuration.md
  - Security: security.md
  - Swarm Simulation: swarm-simulation.md
  - Research: research.md
  - Development: development.md
  - Changelog: changelog.md
